name: Pulse
options:
  bundleIdPrefix: com.pulse
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Pulse:
    type: application
    platform: iOS
    sources:
      - path: Pulse
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pulse.app
        INFOPLIST_FILE: Pulse/Info.plist
        PRODUCT_NAME: Pulse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
    entitlements:
      path: Pulse/Pulse.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    dependencies:
      - package: SQLite.swift
        product: SQLite
    postBuildScripts: []

  PulseWatch:
    type: application
    platform: watchOS
    sources:
      - path: PulseWatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pulse.app.watchkitapp
        PRODUCT_NAME: Pulse Watch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: PulseWatch/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: PulseWatch/PulseWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    dependencies:
      - target: PulseWatchWatch
        embed: true

  PulseWatchWatch:
    type: application
    platform: watchOS
    sources:
      - path: PulseWatchWatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pulse.app.watchkitapp.watchkitextension
        PRODUCT_NAME: PulseWatchWatch
        INFOPLIST_FILE: PulseWatchWatch/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  PulseMac:
    type: application
    platform: macOS
    sources:
      - path: PulseMac
        excludes:
          - "**/.DS_Store"
      - path: Pulse/Models
        excludes:
          - "WatchSharedModels.swift"
          - "PulseR12R20.swift"
      - path: Pulse/ViewModels
        excludes:
          - "PrivacyViewModel.swift"
          - "CaptureViewModel.swift"
      - path: Pulse/Services
        excludes:
          - "**/*.swift"
      - path: Pulse/Views/Components
        excludes:
          - "MomentCard.swift"
      - path: Pulse/Theme
      - path: Pulse/Resources
      - path: Pulse/Views/Pulse
        excludes:
          - "ForecastView.swift"
          - "InsightCardView.swift"
          - "PulseView.swift"
      - path: Pulse/Views/Timeline
        excludes:
          - "DayDetailView.swift"
          - "TimelineView.swift"
      - path: Pulse/Views/Capture
        excludes:
          - "PhotoCaptureView.swift"
          - "VoiceCaptureView.swift"
          - "JournalCaptureView.swift"
          - "CaptureView.swift"
      - path: Pulse/Views/Privacy
        excludes:
          - "DataSourcesView.swift"
          - "DataBrowserView.swift"
          - "LegacyExportView.swift"
          - "SubscriptionsView.swift"
          - "AppStoreListingView.swift"
          - "LegalView.swift"
          - "PrivacyView.swift"
      - path: Pulse/Views/SocialComparison
        excludes:
          - "**/*.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pulse.app.mac
        PRODUCT_NAME: Pulse
        INFOPLIST_FILE: PulseMac/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: PulseMac/PulseMac.entitlements
      properties: {}
    dependencies:
      - package: SQLite.swift
        product: SQLite
